/* ─── State Migration ───────────────────────────────────────────────── */

function migrateState(state){
  if(state.teams){
    state.teams=state.teams.map(t=>{
      const def=TARGET_DEFAULTS[t.id]||{targetF:3,targetM:3};
      const {teamStrengths:_ts,teamWeaknesses:_tw,...rest}=t;
      return{...rest,targetF:t.targetF??def.targetF,targetM:t.targetM??def.targetM};
    });
  }
  if(!state.activityLog)state.activityLog=[];
  return state;
}

/* ─── App ───────────────────────────────────────────────────────────── */

function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem("ivow_auth")===APP_PASSWORD);
  const [pwInput,setPwInput]=useState("");
  const [loginErr,setLoginErr]=useState(null);
  const [showPw,setShowPw]=useState(false);
  const [all,setAll]=useState(STAFF_INIT);
  const [teams,setTeams]=useState(TEAMS_INIT);
  const [pool,setPool]=useState([]);
  const [activityLog,setActivityLog]=useState([]);
  const [dragInfo,setDragInfo]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [tab,setTab]=useState("board");
  const [openCard,setOpenCard]=useState(null);
  const [editingTeam,setEditingTeam]=useState(null);
  const [editingName,setEditingName]=useState("");
  const [search,setSearch]=useState("");
  const [filterGender,setFilterGender]=useState("all");
  const [syncStatus,setSyncStatus]=useState("connecting");
  const [lastSync,setLastSync]=useState(null);
  const [showAddForm,setShowAddForm]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [showPool,setShowPool]=useState(false);
  const [canUndo,setCanUndo]=useState(false);
  const [mobileSelected,setMobileSelected]=useState(null);
  const [collapsed,setCollapsed]=useState({});
  const [toast,setToast]=useState(null);
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState("asc");
  const [filterRating,setFilterRating]=useState("all");
  const [filterStatus,setFilterStatus]=useState("all");
  const [hideRanks,setHideRanks]=useState(()=>localStorage.getItem("ivow_hide_ranks")==="1");
  const wsRef=useRef(null);
  const logRef=useRef([]);
  const undoStack=useRef([]);
  const searchRef=useRef(null);
  const allRef=useRef(all);
  const teamsRef=useRef(teams);
  const poolRef=useRef(pool);
  const initialLoadRef=useRef(true);
  const toastTimer=useRef(null);
  const [isMobile,setIsMobile]=useState(window.innerWidth<640);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<640);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  useEffect(()=>{allRef.current=all;},[all]);
  useEffect(()=>{teamsRef.current=teams;},[teams]);
  useEffect(()=>{poolRef.current=pool;},[pool]);
  useEffect(()=>{localStorage.setItem("ivow_hide_ranks",hideRanks?"1":"0");},[hideRanks]);
  useEffect(()=>{if(hideRanks)setFilterRating("all");},[hideRanks]);
  useEffect(()=>{if(hideRanks&&sortCol==="rating"){setSortCol(null);setSortDir("asc");}},[hideRanks,sortCol]);

  useEffect(()=>{
    const saved=localStorage.getItem("ivow_auth");
    if(saved!=null&&saved!==APP_PASSWORD){
      localStorage.removeItem("ivow_auth");
      setAuthed(false);
    }
  },[]);

  /* ── Password Gate ───────────────────────────────────────────── */

  const handleLogin=()=>{
    if(pwInput===APP_PASSWORD){localStorage.setItem("ivow_auth",APP_PASSWORD);setAuthed(true);setLoginErr(null);}
    else if(LEGACY_PASSWORDS.includes(pwInput))setLoginErr("legacy");
    else setLoginErr("wrong");
  };

  /* ── Toast ───────────────────────────────────────────────────── */

  const showToast=(msg)=>{
    if(toastTimer.current)clearTimeout(toastTimer.current);
    setToast(msg);
    toastTimer.current=setTimeout(()=>setToast(null),3500);
  };

  /* ── Undo ────────────────────────────────────────────────────── */

  const snapshot=()=>{
    undoStack.current=[...undoStack.current.slice(-29),{all:deepClone(allRef.current),teams:deepClone(teamsRef.current),pool:[...poolRef.current]}];
    setCanUndo(true);
  };

  const undo=()=>{
    if(undoStack.current.length===0)return;
    const prev=undoStack.current.pop();
    setAll(prev.all);setTeams(prev.teams);setPool(prev.pool);
    push(prev.all,prev.teams,prev.pool);
    setCanUndo(undoStack.current.length>0);
    addLog("Undo","Reverted last change");
  };

  /* ── Activity Log ────────────────────────────────────────────── */

  const addLog=(action,details)=>{
    const entry={id:Date.now(),time:new Date().toLocaleString(),action,details};
    const newLog=[entry,...logRef.current].slice(0,200);
    logRef.current=newLog;
    setActivityLog(newLog);
    return newLog;
  };

  /* ── WebSocket ───────────────────────────────────────────────── */

  useEffect(()=>{
    if(!authed)return;
    let receivedState=false;
    const connect=()=>{
      const proto=location.protocol==="https:"?"wss":"ws";
      const ws=new WebSocket(`${proto}://${location.host}`);
      wsRef.current=ws;
      ws.onopen=()=>{
        setSyncStatus("live");
        setTimeout(()=>{
          if(!receivedState) push(allRef.current,teamsRef.current,poolRef.current);
        },2500);
      };
      ws.onclose=()=>{setSyncStatus("offline");setTimeout(connect,2000);};
      ws.onerror=()=>setSyncStatus("offline");
      ws.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==="state"&&msg.payload){
            receivedState=true;
            const s=migrateState(msg.payload);
            if(s.all)setAll(s.all);
            if(s.teams){
              // Preserve targetF/targetM from TEAMS_INIT if missing in DB state
              const merged=s.teams.map(t=>{
                const init=TEAMS_INIT.find(ti=>ti.id===t.id);
                return {...t,targetF:t.targetF??init?.targetF??0,targetM:t.targetM??init?.targetM??0};
              });
              setTeams(merged);
            }
            if(s.pool!=null)setPool(s.pool);
            if(s.activityLog){logRef.current=s.activityLog;setActivityLog(s.activityLog);}
            setLastSync(new Date().toLocaleTimeString());
            if(!initialLoadRef.current) showToast("Board updated by another user");
            initialLoadRef.current=false;
          }else if(msg.type==="need_init"){
            push(allRef.current,teamsRef.current,poolRef.current);
          }
        }catch(err){}
      };
    };
    connect();
    return()=>wsRef.current?.close();
  },[authed]);

  /* ── Push to server ──────────────────────────────────────────── */

  const push=(newAll,newTeams,newPool)=>{
    if(wsRef.current?.readyState===1){
      wsRef.current.send(JSON.stringify({type:"update",payload:{all:newAll,teams:newTeams,pool:newPool,activityLog:logRef.current}}));
      setSyncStatus("live");
      setLastSync(new Date().toLocaleTimeString());
    }
  };

  /* ── CRUD ─────────────────────────────────────────────────────── */

  const updC=(id,p)=>{snapshot();const n={...all,[id]:{...all[id],...p}};setAll(n);push(n,teams,pool);};
  const updT=(id,p)=>{snapshot();const n=teams.map(t=>t.id===id?{...t,...p}:t);setTeams(n);push(all,n,pool);};

  const moveTo=(id,from,to)=>{
    if(from===to)return;
    snapshot();
    let np=[...pool],nt=[...teams];
    if(from==="pool")np=np.filter(x=>x!==id);
    else nt=nt.map(t=>t.id===from?{...t,members:t.members.filter(x=>x!==id)}:t);
    if(to==="pool")np=[...np,id];
    else nt=nt.map(t=>t.id===to?{...t,members:[...t.members,id]}:t);
    const fromName=from==="pool"?"Pool":teams.find(t=>t.id===from)?.name||from;
    const toName=to==="pool"?"Pool":teams.find(t=>t.id===to)?.name||to;
    addLog("Move",`${all[id]?.name}: ${fromName} → ${toName}`);
    setPool(np);setTeams(nt);push(all,nt,np);
  };

  const swapStaff=(idA,fromA,idB,fromB)=>{
    if(idA===idB)return;
    snapshot();
    const np=pool.map(m=>m===idA?idB:m===idB?idA:m);
    const nt=teams.map(t=>({...t,members:t.members.map(m=>m===idA?idB:m===idB?idA:m)}));
    addLog("Swap",`${all[idA]?.name} ↔ ${all[idB]?.name}`);
    setPool(np);setTeams(nt);push(all,nt,np);
  };
  const handleSwapDrop=(targetId,targetFrom)=>{
    if(!dragInfo||dragInfo.id===targetId)return;
    swapStaff(dragInfo.id,dragInfo.from,targetId,targetFrom);
    setDragInfo(null);setDragOver(null);
  };

  const addStaff=(staffData)=>{

                      <span style={{flex:1,fontSize:11,fontWeight:600}}>{c.name}</span>
                      <span style={{fontSize:9,color:"#999"}}>{c.gender==="F"?"♀":"♂"}</span>

              </div>
              <div style={{marginBottom:8}}><label style={{fontSize:10.5,fontWeight:700,color:"#555",display:"block",marginBottom:2}}>Address</label><input name="address" placeholder="Full address" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box"}}/></div>
              <div style={{marginBottom:12}}><label style={{fontSize:10.5,fontWeight:700,color:"#555",display:"block",marginBottom:2}}>Experience</label><textarea name="exp" placeholder="Previous experience..." rows={2} style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",resize:"none"}}/></div>
              <button type="submit" title="שמור מדריך חדש ושבץ אותו לבריכה · Save new staff to the pool" style={{width:"100%",padding:"9px 0",background:"#16A34A",color:"white",border:"none",borderRadius:7,cursor:"pointer",fontWeight:800,fontSize:13}}>Add Staff Member</button>
            </form>
          </div>
        </div>
      )}

      {/* ══════════════ STAFF DETAIL MODAL ══════════════ */}
      {openCard!==null&&(()=>{
        const c=all[openCard];if(!c)return null;
        return(
          <div onClick={()=>setOpenCard(null)} style={{position:"fixed",inset:0,background:"#0007",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:14,padding:22,width:460,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 64px #0005",position:"relative"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                    <input value={c.name||""} onChange={e=>updC(openCard,{name:e.target.value})} placeholder="Full name" style={{fontSize:17,fontWeight:800,border:"1.5px solid #E5E7EB",borderRadius:8,padding:"4px 8px",minWidth:180,maxWidth:"100%",flex:1,outline:"none",boxSizing:"border-box"}}/>
                    {c.role&&<span style={{background:"#7C3AED",color:"white",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>★ {c.role}</span>}
                    {c.maybe?<span style={{background:"#F59E0B",color:"white",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>⏳ Pending</span>:c.returning?<span style={{background:"#2563EB",color:"white",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>↩ Returning 2025</span>:null}
                    {c.shabbat&&<span style={{background:"#7C3AED",color:"white",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>🕎 Shabbat</span>}
                  </div>
                  <div style={{fontSize:11,color:"#777"}}>{c.city||"—"}{c.dob?` · Age ${getAge(c.dob)}`:""} · {c.gender==="F"?"Female":"Male"}</div>
                  {c.note&&<div style={{marginTop:4,background:"#EEF4FF",border:"1px solid #93C5FD",borderRadius:5,padding:"3px 8px",fontSize:10.5,color:"#1E40AF"}}>🔗 {c.note}</div>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button type="button" onClick={()=>setConfirmDelete(openCard)} title="מחק מדריך מהמערכת (יופיע אישור) · Delete staff (asks for confirmation)" style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,color:"#DC2626",fontWeight:700}}>🗑</button>
                  <button type="button" onClick={()=>setOpenCard(null)} title="סגור את כרטיס הפרטים · Close detail card" style={{background:"#F3F4F6",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              </div>

              {(()=>{
                const curTeam=pool.includes(openCard)?"pool":teams.find(t=>t.members.includes(openCard))?.id||"pool";
                const curName=curTeam==="pool"?"Pool":teams.find(t=>t.id===curTeam)?.name||curTeam;
                return(
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11,background:"#EEF4FF",borderRadius:8,padding:"8px 10px",border:"1px solid #BFDBFE"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#1E40AF",whiteSpace:"nowrap"}}>📍 {curName}</span>
                    <select value={curTeam} title="העבר את המדריך לצוות אחר או לבריכה · Move staff to another team or pool" onChange={e=>{moveTo(openCard,curTeam,e.target.value);}} style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1.5px solid #93C5FD",fontSize:12,fontWeight:600,background:"white",cursor:"pointer",outline:"none"}}>
                      <option value="pool">Pool</option>
                      {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </div>
                );
              })()}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:11,background:"#F8F9FA",borderRadius:8,padding:10}}>
                <div>
                  <label style={{fontSize:9.5,fontWeight:700,color:"#888",display:"block",marginBottom:2}}>📱 Phone</label>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <input value={c.phone||""} onChange={e=>updC(openCard,{phone:e.target.value})} placeholder="Phone number" style={{flex:1,padding:"4px 7px",borderRadius:5,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
                    {c.phone&&<a href={`tel:${c.phone}`} style={{fontSize:14,textDecoration:"none"}}>📞</a>}
                  </div>
                </div>
                <div>
                  <label style={{fontSize:9.5,fontWeight:700,color:"#888",display:"block",marginBottom:2}}>📧 Email</label>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <input value={c.email||""} onChange={e=>updC(openCard,{email:e.target.value})} placeholder="Email address" style={{flex:1,padding:"4px 7px",borderRadius:5,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
                    {c.email&&<a href={`mailto:${c.email}`} style={{fontSize:14,textDecoration:"none"}}>✉️</a>}
                  </div>
                </div>
                <div style={{gridColumn:"1/3"}}>
                  <label style={{fontSize:9.5,fontWeight:700,color:"#888",display:"block",marginBottom:2}}>🏠 Address</label>
                  <input value={c.address||""} onChange={e=>updC(openCard,{address:e.target.value})} placeholder="Full address" style={{width:"100%",padding:"4px 7px",borderRadius:5,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
                </div>
                <div>
                  <label style={{fontSize:9.5,fontWeight:700,color:"#888",display:"block",marginBottom:2}}>📅 Date of Birth</label>
                  <input type="date" value={c.dob||""} onChange={e=>updC(openCard,{dob:e.target.value})} style={{width:"100%",padding:"4px 7px",borderRadius:5,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
                </div>
                <div>
                  <label style={{fontSize:9.5,fontWeight:700,color:"#888",display:"block",marginBottom:2}}>🏙 City</label>
                  <input value={c.city||""} onChange={e=>updC(openCard,{city:e.target.value})} placeholder="City" style={{width:"100%",padding:"4px 7px",borderRadius:5,border:"1.5px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none"}}/>
                </div>
              </div>

              {!hideRanks&&<div style={{marginBottom:11}}>
                <div style={{fontSize:10.5,fontWeight:700,color:"#555",marginBottom:2}}>Counselor rank</div>
                <div style={{fontSize:9,color:"#888",marginBottom:4}}>1 = best · 3 = weakest (not a star rating)</div>
                <div style={{display:"flex",gap:5}}>
                  {[1,2,3].map(r=>(<button key={r} type="button" onClick={()=>updC(openCard,{rating:c.rating===r?null:r})} title={r===1?"דירוג 1 — החזק ביותר · Strongest rank":r===2?"דירוג 2 — בינוני · Middle rank":"דירוג 3 — חלש יותר · Weaker rank; לחיצה חוזרת מבטלת · Tap again to clear"} style={{flex:1,padding:"7px 0",borderRadius:6,border:`2px solid ${c.rating===r?RATING_C[r]:"#E5E7EB"}`,background:c.rating===r?RATING_C[r]:"white",color:c.rating===r?"white":"#555",cursor:"pointer",fontWeight:700,fontSize:12}}>{r} — {RATING_L[r]}</button>))}
                </div>
              </div>}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
                <label style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><input type="checkbox" checked={c.returning} onChange={e=>updC(openCard,{returning:e.target.checked})}/><span style={{fontWeight:600,color:"#2563EB"}}>↩ Returning</span></label>
                <label style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><input type="checkbox" checked={c.maybe} onChange={e=>updC(openCard,{maybe:e.target.checked})}/><span style={{fontWeight:600,color:"#D97706"}}>⏳ Maybe</span></label>
                <label style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><input type="checkbox" checked={!!c.shabbat} onChange={e=>updC(openCard,{shabbat:e.target.checked})}/><span style={{fontWeight:600,color:"#7C3AED"}}>🕎 Shabbat</span></label>
              </div>

              <div style={{background:"#F8F9FA",borderRadius:7,padding:"7px 10px",marginBottom:10}}>
                <div style={{fontSize:9.5,fontWeight:700,color:"#888",marginBottom:2}}>Role</div>
                <input value={c.role||""} onChange={e=>updC(openCard,{role:e.target.value})} placeholder="e.g. Team Lead" style={{width:"100%",padding:"4px 7px",borderRadius:5,border:"1px solid #E5E7EB",fontSize:12,boxSizing:"border-box",outline:"none",background:"transparent"}}/>
              </div>
              <div style={{background:"#F8F9FA",borderRadius:7,padding:"7px 10px",marginBottom:10}}>
                <div style={{fontSize:9.5,fontWeight:700,color:"#888",marginBottom:2}}>Experience</div>
                <textarea value={c.exp||""} onChange={e=>updC(openCard,{exp:e.target.value})} placeholder="Experience..." rows={2} style={{width:"100%",borderRadius:5,border:"1px solid #E5E7EB",padding:"4px 6px",fontSize:12,boxSizing:"border-box",resize:"none",outline:"none",background:"transparent"}}/>
              </div>
              <div style={{marginBottom:9}}>
                <label style={{fontSize:10.5,fontWeight:700,color:"#16A34A",display:"block",marginBottom:3}}>💪 Strengths</label>
                <textarea value={c.strengths} onChange={e=>updC(openCard,{strengths:e.target.value})} placeholder="What are their strengths?" rows={3} style={{width:"100%",borderRadius:6,border:"1.5px solid #86EFAC",padding:"5px 7px",fontSize:12,boxSizing:"border-box",resize:"none",outline:"none"}}/>
              </div>
              <div style={{marginBottom:9}}>
                <label style={{fontSize:10.5,fontWeight:700,color:"#DC2626",display:"block",marginBottom:3}}>⚠️ Weaknesses</label>
                <textarea value={c.weaknesses} onChange={e=>updC(openCard,{weaknesses:e.target.value})} placeholder="What are their weaknesses?" rows={3} style={{width:"100%",borderRadius:6,border:"1.5px solid #FCA5A5",padding:"5px 7px",fontSize:12,boxSizing:"border-box",resize:"none",outline:"none"}}/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10.5,fontWeight:700,color:"#555",display:"block",marginBottom:3}}>📝 Notes</label>
                <textarea value={c.notes} onChange={e=>updC(openCard,{notes:e.target.value})} placeholder="Notes..." rows={2} style={{width:"100%",borderRadius:6,border:"1.5px solid #E5E7EB",padding:"5px 7px",fontSize:12,boxSizing:"border-box",resize:"none",outline:"none"}}/>
              </div>

              {confirmDelete===openCard&&(
                <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.95)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
                  <div style={{textAlign:"center",padding:24}}>
                    <div style={{fontSize:32,marginBottom:10}}>🗑</div>
                    <div style={{fontSize:16,fontWeight:700,color:"#DC2626",marginBottom:6}}>Delete {c.name}?</div>
                    <div style={{fontSize:12,color:"#777",marginBottom:16}}>This will permanently remove them from all teams.</div>
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button type="button" onClick={()=>setConfirmDelete(null)} title="בטל מחיקה · Cancel delete" style={{padding:"8px 24px",borderRadius:8,border:"1px solid #DDD",background:"white",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                      <button type="button" onClick={()=>deleteStaff(openCard)} title="מחק לצמיתות מכל הצוותים · Permanently remove from all teams" style={{padding:"8px 24px",borderRadius:8,border:"none",background:"#DC2626",color:"white",cursor:"pointer",fontSize:13,fontWeight:700}}>Yes, Delete</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* ══════════════ MOBILE SELECTION BAR ══════════════ */}
      {mobileSelected&&isMobile&&(
        <div className="no-print" style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(135deg,#1E3A5F,#0f172a)",color:"white",padding:"10px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 -4px 20px #0005",zIndex:100}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:"#3B82F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>{all[mobileSelected.id]?.name?.[0]}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>Moving: {all[mobileSelected.id]?.name}</div>
            <div style={{fontSize:10,opacity:0.7}}>Tap a team or pool to place</div>
          </div>
          <button type="button" onClick={()=>setMobileSelected(null)} title="בטל העברה — המדריך נשאר במקום · Cancel move; staff stays put" style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>Cancel</button>
        </div>
      )}

      {/* ══════════════ TOAST ══════════════ */}
      {toast&&(
        <div style={{position:"fixed",bottom:isMobile&&mobileSelected?70:20,left:"50%",transform:"translateX(-50%)",background:"#0f172a",color:"white",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 8px 30px #0004",zIndex:300,animation:"toastIn 0.3s ease",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

/* ─── StaffCard Component ───────────────────────────────────────────── */

function StaffCard({c,from,onDragStart,onDragEnd,onOpen,onRate,onSwapDrop,search,isMobile,isSelected,onMobileTap,dimmed,hideRanks}){
  if(!c)return null;
  const bg=isSelected?"#DBEAFE":c.maybe?"#FFFBEB":c.returning?"#EEF4FF":"white";
  const border=isSelected?"#3B82F6":c.maybe?"#FCD34D":c.returning?"#93C5FD":"#E2D9CE";
  const avatarBg=c.maybe?"#F59E0B":c.returning?"#3B82F6":(c.gender==="F"?"#F9A8D4":"#93C5FD");
  const isMatch=search&&matchesSearch(c,search);
  return(
    <div draggable={!isMobile} onDragStart={()=>onDragStart(c.id)} onDragEnd={onDragEnd} onClick={onOpen} onDragOver={e=>{e.preventDefault();e.stopPropagation();}} onDrop={e=>{e.stopPropagation();if(onSwapDrop)onSwapDrop(c.id,from);}} className={isMatch?"search-match":""}
      style={{display:"flex",alignItems:"center",gap:5,padding:"4px 7px",borderRadius:6,background:bg,border:`1.5px solid ${border}`,cursor:isMobile?"pointer":"grab",userSelect:"none",boxShadow:isSelected?"0 0 0 2px #3B82F6":"0 1px 3px #0001",marginBottom:1,transition:"all 0.15s",opacity:dimmed?0.3:1}}
      onMouseEnter={e=>{if(!isMobile){e.currentTarget.style.boxShadow="0 3px 10px #0002";e.currentTarget.style.transform="translateY(-1px)";}}}
      onMouseLeave={e=>{if(!isMobile){e.currentTarget.style.boxShadow=isSelected?"0 0 0 2px #3B82F6":"0 1px 3px #0001";e.currentTarget.style.transform="none";}}}>
      <div style={{width:22,height:22,borderRadius:"50%",background:avatarBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"white",flexShrink:0}}>{c.name[0]}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:11,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {c.role&&<span style={{fontSize:8,background:"#7C3AED",color:"white",borderRadius:3,padding:"1px 3px",marginRight:3}}>★</span>}
          {c.maybe&&<span style={{fontSize:8,background:"#FEF9C3",color:"#854D0E",borderRadius:3,padding:"1px 3px",marginRight:3}}>⏳</span>}
          {c.shabbat&&<span style={{fontSize:9,background:"#EDE9FE",color:"#7C3AED",borderRadius:3,padding:"1px 3px",marginRight:3}}>🕎</span>}
          {c.name}
        </div>
        <div style={{fontSize:8.5,color:"#AAA"}}>{c.dob?`${getAge(c.dob)} · `:""}{c.gender==="F"?"♀":"♂"}{c.returning?" · ↩":""}{c.city?` · ${c.city}`:""}</div>
        {c.exp&&<div style={{fontSize:7.5,color:"#C4B5A4",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:140}}>{c.exp}</div>}
      </div>
      {!hideRanks&&<div style={{display:"flex",gap:2,flexShrink:0}}>
        {[1,2,3].map(r=>(<button key={r} type="button" onClick={e=>{e.stopPropagation();onRate(r);}} title={r===1?"דירוג 1 (החזק) · לחיצה חוזרת מבטלת · Rank 1, tap again to clear":r===2?"דירוג 2 · Rank 2":"דירוג 3 (חלש יותר) · Rank 3"} style={{width:15,height:15,borderRadius:3,border:"none",background:c.rating===r?RATING_C[r]:"#EDEDED",color:c.rating===r?"white":"#888",cursor:"pointer",fontSize:8.5,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{r}</button>))}
      </div>}
      <button type="button" onClick={e=>{e.stopPropagation();onOpen();}} title="פתח כרטיס מלא לעריכת פרטים · Open full detail card" style={{background:"none",border:"none",cursor:"pointer",opacity:0.35,fontSize:10,padding:"0 1px"}}>✎</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
